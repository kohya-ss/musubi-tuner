name: Tests

on:
  pull_request:
    branches:
      - main
  push:
    paths:
      - ".github/workflows/tests.yml"
      - "src/musubi_tuner/**"
      - "tests/**"
      - ".python-version"
      - "pyproject.toml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: "Install uv"
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install the project with dev and pytorch cpu dependencies
        run: uv sync --dev --extra cpu

      - name: "Run tests with coverage"
        run: uv run pytest -v --tb=short --cov=src/musubi_tuner --cov-report=term-missing --cov-report=xml

      - name: "Upload coverage to artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
